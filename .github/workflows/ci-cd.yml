name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code (Checkout)
        uses: actions/checkout@v3

      - name: 1) Installation de Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Installation des dépendances
        run: npm ci

      - name: 2) Tests
        run: npm test

      - name: Connexion à Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 3 & 4) Build Docker et Push image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/subtracker:latest

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: 5 & 6) Déploiement sur la VM (SSH) et MAJ Kubernetes
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Demande à Kubernetes de télécharger la dernière image poussée
            kubectl rollout restart deployment/subtracker-app
